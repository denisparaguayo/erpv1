{% extends 'base.html' %}
{% block title %}Mi Cuenta · ERP Mbarete{% endblock %}
{% block content %}
<section class="page-header">
  <div>
    <h2>Mi cuenta</h2>
    <p class="muted">Actualiza tu email de acceso y tu contrasena.</p>
  </div>
</section>
<section class="card" style="max-width: 820px;">
  <form method="post" class="form-grid small">
    <label>
      Email
      <input type="email" name="email" value="{{ current_user.email if current_user else '' }}" required>
    </label>
    <label>
      Nueva contrasena (opcional)
      <input type="password" name="new_password" placeholder="Dejar vacio para no cambiar">
    </label>
    <div class="form-actions">
      <button class="button" type="submit">Guardar cambios</button>
    </div>
  </form>
</section>
{% endblock %}
