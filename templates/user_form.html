{% extends 'base.html' %}
{% block title %}Nuevo Usuario · ERP Mbarete{% endblock %}
{% block content %}
<section class="card">
  <h1>Nuevo usuario</h1>
  <form method="post" class="grid grid-2">
    <label>Email
      <input type="email" name="email" required>
    </label>
    <label>Rol
      <select name="role_code" required>
        {% for role in roles %}
          <option value="{{ role.code }}">{{ role.code }} - {{ role.name }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="span-2">Contrasena
      <input type="password" name="password" required>
    </label>
    <div class="span-2" style="display: flex; gap: 8px;">
      <button class="button" type="submit">Crear usuario</button>
      <a class="button secondary" href="{{ url_for('users_index') }}">Cancelar</a>
    </div>
  </form>
</section>
{% endblock %}
