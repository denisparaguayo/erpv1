<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recuperar contrasena · ERP Mbarete</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
</head>
<body>
  <main class="content auth-shell">
    <section class="card auth-card">
      <h1>Recuperar contrasena</h1>
      <p class="muted">Necesitas email + clave de recuperacion definida en servidor.</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-stack">
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      <form method="post" class="stacked-form">
        <label>Email
          <input type="email" name="email" required>
        </label>
        <label>Nueva contrasena
          <input type="password" name="new_password" required>
        </label>
        <label>Clave de recuperacion
          <input type="password" name="reset_key" required>
        </label>
        <button class="btn" type="submit">Actualizar contrasena</button>
      </form>
      <p style="margin-top: 12px;"><a href="{{ url_for('login') }}">Volver al login</a></p>
    </section>
  </main>
</body>
</html>
